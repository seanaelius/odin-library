<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Library</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<!--IDEAL LAYOUT HERE https://mooniidev.github.io/library/-->

<body>
    <main>
        <section>
            <h1>The Odin Project Library</h1>

            <table class="table">
                <!--HEADER-->
                <thead>
                    <tr>
                        <th colspan="5">MASTERCHEFCANADA's Books</th>
                    </tr>
                </thead>

                <!--BODY-->
                <tbody class="body">
                    <tr>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Pages</th>
                        <th>Read</th> <!--NEED TO ADD TOGGLE FOR READ OPTION-->
                        <th>Delete</th>
                        <!--NEED TO ADD TRASH BUTTON-->
                    </tr>
                    <!--IN SCRIPT.JS, displayLibrary() WILL ADD ROWS HERE-->
                </tbody>
            </table>
            <!--ADD NEW BOOK BUTTON-->
            <button id="update">Update Table</button>
            <button id="new-book">NEW BOOK</button>
        </section>
        <aside class="side-form">
            <form action="" method="get">
                <div class="title">
                    <label for="title">Title: </label>
                    <input type="text">
                </div>

                <div class="author">
                    <label for="author">Author: </label>
                    <input type="text">
                </div>

                <div class="pages">
                    <label for="pages">Pages: </label>
                    <input type="text">
                </div>

                <div class="read">
                    <label for="read" class="switch">Read:
                        <input type="checkbox">
                        <span class="slider round"></span>
                    </label>
                </div>

            </form>
            <button type="submit">Submit</button>
        </aside>
    </main>
</body>

</html>
